[mypy]
python_version = 3.12
strict = true
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

# Scrapers pre-existentes con código Playwright sin anotar completamente
# mypy resuelve estos módulos como src.sky.* cuando se invoca desde backend-python/
[mypy-src.sky.ingestion.sources.bchile_scraper]
ignore_errors = True

[mypy-src.sky.ingestion.sources.bci_direct]
ignore_errors = True

[mypy-src.sky.ingestion.sources.falabella_scraper]
ignore_errors = True

[mypy-src.sky.ingestion.browser_pool]
ignore_errors = True
