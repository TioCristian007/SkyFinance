target-version = "py312"
line-length = 100

[lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["S101"]

[lint.per-file-ignores]
# Scrapers contienen strings JS multilínea y patrones try/except/pass intencionales
"src/sky/ingestion/sources/bchile_scraper.py" = ["E501", "SIM105"]
"src/sky/ingestion/sources/bci_scraper.py" = ["E501", "SIM105"]
# Categorizador tiene reglas regex y system prompt que no se pueden romper sin alterar lógica
"src/sky/domain/categorizer.py" = ["E501"]
# Clasificadores ARIA: regex idénticos a Node.js — no romper para mantener paridad
"src/sky/domain/aria.py" = ["E501"]
# Mr. Money: tool descriptions y system prompt largo
"src/sky/domain/mr_money.py" = ["E501"]
# Challenges: catálogo MOCK_CHALLENGES es una tabla de datos alineada (legibilidad > 100 chars)
"src/sky/domain/challenges.py" = ["E501"]
# Tests: decoradores @patch y strings de aserción inevitablemente largos
"tests/unit/test_aria.py" = ["E501"]
"tests/unit/test_mr_money.py" = ["E501"]
"tests/unit/test_sync_job.py" = ["E501"]
"tests/unit/test_router.py" = ["E501"]
# banking_sync: mensajes de usuario en español fijos (no se pueden acortar sin perder claridad)
"src/sky/worker/banking_sync.py" = ["E501"]
# Scripts pre-existentes: errores cosméticos heredados, fuera de scope de refactor
"scripts/smoke_router.py" = ["E501", "SIM105", "F541", "I001"]
"scripts/test_bchile_scraper.py" = ["F541"]
"scripts/test_bci_scraper.py" = ["F541", "W605"]
"scripts/verify_encryption_compat.py" = ["I001"]
