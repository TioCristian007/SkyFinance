services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file: ../.env
    depends_on:
      - redis

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    env_file: ../.env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
